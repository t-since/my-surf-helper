<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초보 SUP 서핑 차트 분석기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        .scroll-container {
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x proximity;
            gap: 0.75rem;
            padding: 0.5rem 0.25rem 1rem 0.25rem;
            width: 100%;
            cursor: grab;
        }

        .scroll-container:active {
            cursor: grabbing;
        }

        .scroll-item {
            scroll-snap-align: start;
            flex: 0 0 auto;
            user-select: none;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Waves: <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1" />,
                Wind: <path d="M17.7 7.7A2.5 2.5 0 1 1 20 12H2M12.6 19.7A2.5 2.5 0 1 1 14 15H2M7.9 4.3A2.5 2.5 0 1 1 9 8H2" />,
                Navigation: <polygon points="3 11 22 2 13 21 11 13 3 11" />,
                CheckCircle2: <><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>,
                MapPin: <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>,
                RefreshCw: <><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></>,
                XCircle: <><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></>,
                Sunrise: <><path d="M12 2v8"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m8 22 4-10 4 10"/><path d="M12 18a2 2 0 1 1 0-4 2 2 0 0 1 0 4Z"/></>,
                Sunset: <><path d="M12 10V2"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m16 22-4-10-4 10"/><path d="M12 18a2 2 0 1 1 0-4 2 2 0 0 1 0 4Z"/></>,
                Info: <><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></>,
                Thermometer: <><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></>
            };

            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const useDraggableScroll = () => {
            const ref = useRef(null);
            const [isDown, setIsDown] = useState(false);
            const [startX, setStartX] = useState(0);
            const [scrollLeft, setScrollLeft] = useState(0);

            useEffect(() => {
                const el = ref.current;
                if (!el) return;

                const handleMouseDown = (e) => {
                    setIsDown(true);
                    setStartX(e.pageX - el.offsetLeft);
                    setScrollLeft(el.scrollLeft);
                };
                const handleMouseLeave = () => setIsDown(false);
                const handleMouseUp = () => setIsDown(false);
                const handleMouseMove = (e) => {
                    if (!isDown) return;
                    e.preventDefault();
                    const x = e.pageX - el.offsetLeft;
                    const walk = (x - startX) * 2;
                    el.scrollLeft = scrollLeft - walk;
                };

                el.addEventListener('mousedown', handleMouseDown);
                el.addEventListener('mouseleave', handleMouseLeave);
                el.addEventListener('mouseup', handleMouseUp);
                el.addEventListener('mousemove', handleMouseMove);

                return () => {
                    el.removeEventListener('mousedown', handleMouseDown);
                    el.removeEventListener('mouseleave', handleMouseLeave);
                    el.removeEventListener('mouseup', handleMouseUp);
                    el.removeEventListener('mousemove', handleMouseMove);
                };
            }, [isDown, startX, scrollLeft]);

            return ref;
        };

        const App = () => {
            const spots = {
                '양양 죽도': { lat: 38.025, lng: 128.718 },
                '양양 인구': { lat: 38.020, lng: 128.719 },
                '양양 동산': { lat: 38.016, lng: 128.724 },
                '양양 기사문': { lat: 38.012, lng: 128.728 },
                '고성 송지호': { lat: 38.337, lng: 128.513 },
                '고성 봉포': { lat: 38.246, lng: 128.567 },
            };

            const next14Days = useMemo(() => {
                const days = [];
                for (let i = 0; i < 14; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() + i);
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    days.push(`${y}-${m}-${day}`);
                }
                return days;
            }, []);

            const [selectedSpot, setSelectedSpot] = useState('양양 죽도');
            const [selectedDate, setSelectedDate] = useState(next14Days[0]);
            const [data, setData] = useState({ morning: null, afternoon: null });
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            const spotScrollRef = useDraggableScroll();
            const dateScrollRef = useDraggableScroll();

            const fetchSurfData = async (spotName, dateStr) => {
                setLoading(true);
                setError(null);
                const spot = spots[spotName];
                try {
                    // 수온(water_temperature)을 요청에서 제외하여 데이터 누락으로 인한 오류 방지
                    const marineUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${spot.lat}&longitude=${spot.lng}&hourly=wave_height,wave_period,wave_direction,swell_wave_height&timezone=Asia%2FSeoul&start_date=${dateStr}&end_date=${dateStr}`;
                    const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${spot.lat}&longitude=${spot.lng}&hourly=wind_speed_10m,wind_direction_10m&timezone=Asia%2FSeoul&start_date=${dateStr}&end_date=${dateStr}`;

                    const [marineRes, weatherRes] = await Promise.all([fetch(marineUrl), fetch(weatherUrl)]);
                    
                    if (!marineRes.ok || !weatherRes.ok) {
                        throw new Error("서버 응답이 원활하지 않습니다.");
                    }

                    const marineJson = await marineRes.json();
                    const weatherJson = await weatherRes.json();

                    if (!marineJson || !marineJson.hourly || !weatherJson || !weatherJson.hourly) {
                        throw new Error("API 데이터가 존재하지 않는 날짜입니다.");
                    }

                    const getAvgData = (startHour, endHour) => {
                        const startTimeStr = `${dateStr}T${String(startHour).padStart(2, '0')}:00`;
                        const endTimeStr = `${dateStr}T${String(endHour).padStart(2, '0')}:00`;
                        
                        const timeArray = marineJson.hourly.time;
                        if (!timeArray) return null;
                        
                        const startIdx = timeArray.findIndex(t => t.startsWith(startTimeStr));
                        const endIdx = timeArray.findIndex(t => t.startsWith(endTimeStr));

                        if (startIdx === -1 || endIdx === -1) return null;

                        const sliceH = arr => (arr ? arr.slice(startIdx, endIdx + 1) : []);
                        const avg = arr => {
                            const validData = (arr || []).filter(v => v !== null && v !== undefined);
                            if (validData.length === 0) return 0;
                            const sum = validData.reduce((a, b) => a + b, 0);
                            return (sum / validData.length).toFixed(1);
                        };
                        
                        const getWindDirLabel = (deg) => {
                            if (deg >= 225 && deg <= 315) return 'W';
                            if (deg > 315 || deg < 45) return 'N';
                            if (deg >= 45 && deg <= 135) return 'E';
                            return 'S';
                        };

                        const targetWindDirs = sliceH(weatherJson.hourly.wind_direction_10m);
                        let mostFrequentWindDir = 'N';
                        if (targetWindDirs.length > 0) {
                            const counts = {};
                            targetWindDirs.forEach(d => {
                                if (d !== null) {
                                    const label = getWindDirLabel(d);
                                    counts[label] = (counts[label] || 0) + 1;
                                }
                            });
                            const keys = Object.keys(counts);
                            if (keys.length > 0) {
                                mostFrequentWindDir = keys.reduce((a, b) => counts[a] > counts[b] ? a : b);
                            }
                        }

                        return {
                            waveHeight: parseFloat(avg(sliceH(marineJson.hourly.wave_height))),
                            period: parseFloat(avg(sliceH(marineJson.hourly.wave_period))),
                            windDir: mostFrequentWindDir,
                            windSpeed: parseFloat(avg(sliceH(weatherJson.hourly.wind_speed_10m))),
                        };
                    };

                    setData({
                        morning: getAvgData(6, 11),
                        afternoon: getAvgData(12, 17)
                    });
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchSurfData(selectedSpot, selectedDate);
            }, [selectedSpot, selectedDate]);

            const analyzeConditions = (d, timeLabel) => {
                if (!d) return null;
                let score = 0;
                let pros = [];
                let cons = [];
                
                if (d.waveHeight >= 0.3 && d.waveHeight <= 0.8) {
                    score += 50;
                    pros.push(`${timeLabel} 파도가 낮아 SUP 초보자가 패들링과 균형 잡기에 완벽합니다.`);
                } else if (d.waveHeight > 1.0) {
                    cons.push(`${timeLabel} 파도가 다소 높습니다. SUP은 보드가 커서 파도에 밀릴 때 위험할 수 있어요.`);
                } else if (d.waveHeight < 0.2) {
                    pros.push("파도가 거의 없지만, 패들링 연습이나 크루징하기에는 평화롭고 좋습니다.");
                }

                const isOffshore = ['W', 'NW', 'SW'].includes(d.windDir);
                if (isOffshore && d.windSpeed < 15) {
                    score += 40;
                    pros.push("약한 오프쇼어 바람으로 수면이 잔잔해 보드 위에서 중심 잡기 좋습니다.");
                } else if (d.windSpeed > 20) {
                    score -= 30;
                    cons.push("풍속이 강합니다! SUP은 몸이 바람을 다 받기 때문에 체력 소모가 매우 심할 수 있어요.");
                } else if (!isOffshore) {
                    cons.push("온쇼어 바람으로 수면이 칩(Chop)해질 수 있어 밸런스 잡기가 까다롭습니다.");
                }

                if (d.period >= 7) {
                    score += 10;
                    pros.push("파도 주기가 길어 여유 있게 테이크오프 시도를 할 수 있습니다.");
                }

                let travelAdvice = score >= 80 ? "SUP 하기 최고의 날" : score >= 50 ? "무난한 연습 조건" : "SUP 초보 비추천";
                let color = score >= 80 ? "text-emerald-600" : score >= 50 ? "text-blue-600" : "text-amber-600";
                let bg = score >= 80 ? "bg-emerald-50" : score >= 50 ? "bg-blue-50" : "bg-amber-50";
                let border = score >= 80 ? "border-emerald-200" : score >= 50 ? "border-blue-200" : "border-amber-200";

                return { pros, cons, color, bg, border, travelAdvice, score };
            };

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans pb-20 bg-slate-50">
                    <div className="max-w-2xl mx-auto space-y-6">
                        <header className="flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight flex items-center gap-2">
                                    <Icon name="Waves" className="text-blue-600" /> SUP 서프-헬퍼
                                </h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">SUP BEGINNER AM/PM GUIDE</p>
                            </div>
                            <button onClick={() => fetchSurfData(selectedSpot, selectedDate)} className="p-2 bg-white rounded-full shadow-sm border active:scale-95 transition-transform">
                                <Icon name="RefreshCw" className={`text-slate-400 ${loading ? 'animate-spin' : ''}`} />
                            </button>
                        </header>

                        {/* 지역 및 날짜 선택 */}
                        <div className="space-y-4">
                            <div className="w-full overflow-hidden">
                                <div ref={spotScrollRef} className="scroll-container no-scrollbar">
                                    {Object.keys(spots).map(spot => (
                                        <div key={spot} className="scroll-item">
                                            <button 
                                                onClick={() => setSelectedSpot(spot)} 
                                                className={`px-5 py-2.5 rounded-2xl text-sm font-bold transition-all border-2 whitespace-nowrap ${selectedSpot === spot ? 'bg-slate-900 border-slate-900 text-white shadow-lg' : 'bg-white text-slate-500 border-slate-200 hover:border-slate-300'}`}
                                            >
                                                {spot}
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="w-full overflow-hidden">
                                <div ref={dateScrollRef} className="scroll-container no-scrollbar">
                                    {next14Days.map((date) => {
                                        const d = new Date(date);
                                        const dayName = ['일', '월', '화', '수', '목', '금', '토'][d.getDay()];
                                        const displayDate = date.split('-');
                                        return (
                                            <div key={date} className="scroll-item">
                                                <button 
                                                    onClick={() => setSelectedDate(date)} 
                                                    className={`flex flex-col items-center min-w-[75px] py-4 rounded-[2rem] transition-all border-2 ${selectedDate === date ? 'bg-blue-50 border-blue-500 text-blue-700' : 'bg-white border-slate-100 text-gray-400 shadow-sm hover:border-slate-300'}`}
                                                >
                                                    <span className="text-[10px] font-bold opacity-60 mb-1">{displayDate[1]}/{displayDate[2]}</span>
                                                    <span className="text-xl font-black">{displayDate[2]}</span>
                                                    <span className="text-[10px] font-bold">({dayName})</span>
                                                </button>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {loading ? (
                            <div className="h-96 flex flex-col items-center justify-center bg-white rounded-[3rem] border-2 border-dashed border-slate-200">
                                <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="text-slate-400 font-bold text-sm italic tracking-widest uppercase">데이터 분석 중...</p>
                            </div>
                        ) : error ? (
                             <div className="h-64 flex flex-col items-center justify-center bg-white rounded-[3rem] border-2 border-slate-200 text-center p-6">
                                <Icon name="XCircle" className="text-red-400 mb-3" size={40} />
                                <p className="text-slate-600 font-bold px-4">{error}</p>
                                <button onClick={() => fetchSurfData(selectedSpot, selectedDate)} className="mt-4 text-blue-600 font-bold text-sm underline">다시 시도하기</button>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <SessionCard 
                                    title="오전 SUP 세션" 
                                    time="06:00 - 12:00" 
                                    icon="Sunrise" 
                                    data={data.morning} 
                                    analysis={analyzeConditions(data.morning, "오전")} 
                                />
                                <SessionCard 
                                    title="오후 SUP 세션" 
                                    time="12:00 - 18:00" 
                                    icon="Sunset" 
                                    data={data.afternoon} 
                                    analysis={analyzeConditions(data.afternoon, "오후")} 
                                />
                            </div>
                        )}
                        <p className="text-center text-[10px] text-slate-400 font-bold opacity-70 italic tracking-tight uppercase">Data powered by Open-Meteo Marine API</p>
                    </div>
                </div>
            );
        };

            const SessionCard = ({ title, time, icon, data, analysis }) => {
            if (!data || !analysis) {
                return (
                    <div className="flex flex-col items-center justify-center h-full min-h-[300px] bg-white rounded-[2.5rem] border-2 border-slate-100 p-8 text-center">
                        <Icon name="Info" className="text-slate-300 mb-2" size={32} />
                        <p className="text-slate-400 font-bold text-xs uppercase tracking-tight leading-relaxed">해당 시간대의<br/>데이터가 충분하지 않습니다.</p>
                    </div>
                );
            }
            
            return (
                <div className={`flex flex-col h-full bg-white rounded-[2.5rem] border-2 ${analysis.border} overflow-hidden shadow-sm hover:shadow-md transition-shadow`}>
                    <div className={`${analysis.bg} p-6 border-b ${analysis.border}`}>
                        <div className="flex justify-between items-start mb-4">
                            <div className={`p-3 rounded-2xl bg-white shadow-sm ${analysis.color}`}>
                                <Icon name={icon} size={24} />
                            </div>
                            <div className="text-right">
                                <span className="block text-[10px] font-black text-slate-400 uppercase tracking-tighter mb-1">{time}</span>
                                <span className={`text-xl font-black ${analysis.color}`}>{analysis.travelAdvice}</span>
                            </div>
                        </div>
                        <h3 className="text-lg font-black text-slate-800 mb-4">{title}</h3>
                        
                        <div className="flex justify-between mt-2 px-1">
                            <div className="flex flex-col">
                                <span className="text-[10px] font-bold text-slate-400 uppercase">파고</span>
                                <span className="text-md font-black text-slate-800">{data.waveHeight}m</span>
                            </div>
                            <div className="flex flex-col">
                                <span className="text-[10px] font-bold text-slate-400 uppercase">풍향</span>
                                <span className="text-md font-black text-slate-800">{data.windDir}</span>
                            </div>
                            <div className="flex flex-col">
                                <span className="text-[10px] font-bold text-slate-400 uppercase">풍속</span>
                                <span className="text-md font-black text-slate-800">{data.windSpeed}km</span>
                            </div>
                            <div className="flex flex-col">
                                <span className="text-[10px] font-bold text-slate-400 uppercase">주기</span>
                                <span className="text-md font-black text-slate-800">{data.period}s</span>
                            </div>
                        </div>
                    </div>
                    
                    <div className="p-6 flex-grow space-y-3 bg-white">
                        {analysis.pros.map((msg, i) => (
                            <div key={i} className="flex gap-2 text-[11px] font-bold text-slate-600 leading-snug">
                                <Icon name="CheckCircle2" size={14} className="text-emerald-500 shrink-0 mt-0.5" />
                                <span>{msg}</span>
                            </div>
                        ))}
                        {analysis.cons.map((msg, i) => (
                            <div key={i} className="flex gap-2 text-[11px] font-bold text-slate-500 leading-snug opacity-70">
                                <Icon name="XCircle" size={14} className="text-amber-400 shrink-0 mt-0.5" />
                                <span>{msg}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
