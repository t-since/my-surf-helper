<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초보 전용 서핑 차트 분석기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        .scroll-container {
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x proximity;
            gap: 0.75rem;
            padding: 0.5rem 0.25rem 1rem 0.25rem;
            width: 100%;
            cursor: grab; /* PC에서 잡고 끌 수 있다는 표시 */
        }

        .scroll-container:active {
            cursor: grabbing;
        }

        .scroll-item {
            scroll-snap-align: start;
            flex: 0 0 auto;
            user-select: none; /* 드래그 시 텍스트 선택 방지 */
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Waves: <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1" />,
                Wind: <path d="M17.7 7.7A2.5 2.5 0 1 1 20 12H2M12.6 19.7A2.5 2.5 0 1 1 14 15H2M7.9 4.3A2.5 2.5 0 1 1 9 8H2" />,
                Navigation: <polygon points="3 11 22 2 13 21 11 13 3 11" />,
                CheckCircle2: <><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>,
                MapPin: <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>,
                RefreshCw: <><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></>,
                XCircle: <><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></>,
                Car: <><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></>,
                ThumbsUp: <path d="M7 10v12M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2h0a3.13 3.13 0 0 1 3 3.88Z" />,
                ThumbsDown: <path d="M17 14V2M9 18.12 10 14H4.17a2 2 0 0 1-1.92-2.56l2.33-8A2 2 0 0 1 6.5 2H20a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-2.76a2 2 0 0 0-1.79 1.11L12 22h0a3.13 3.13 0 0 1-3-3.88Z" />,
                AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>
            };

            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // PC 드래그 스크롤 커스텀 훅
        const useDraggableScroll = () => {
            const ref = useRef(null);
            const [isDown, setIsDown] = useState(false);
            const [startX, setStartX] = useState(0);
            const [scrollLeft, setScrollLeft] = useState(0);

            useEffect(() => {
                const el = ref.current;
                if (!el) return;

                const handleMouseDown = (e) => {
                    setIsDown(true);
                    setStartX(e.pageX - el.offsetLeft);
                    setScrollLeft(el.scrollLeft);
                };

                const handleMouseLeave = () => setIsDown(false);
                const handleMouseUp = () => setIsDown(false);

                const handleMouseMove = (e) => {
                    if (!isDown) return;
                    e.preventDefault();
                    const x = e.pageX - el.offsetLeft;
                    const walk = (x - startX) * 2; // 스크롤 속도 조절
                    el.scrollLeft = scrollLeft - walk;
                };

                // 휠 스크롤을 가로 스크롤로 변환
                const handleWheel = (e) => {
                    if (e.deltaY !== 0) {
                        el.scrollLeft += e.deltaY;
                        e.preventDefault();
                    }
                };

                el.addEventListener('mousedown', handleMouseDown);
                el.addEventListener('mouseleave', handleMouseLeave);
                el.addEventListener('mouseup', handleMouseUp);
                el.addEventListener('mousemove', handleMouseMove);
                el.addEventListener('wheel', handleWheel, { passive: false });

                return () => {
                    el.removeEventListener('mousedown', handleMouseDown);
                    el.removeEventListener('mouseleave', handleMouseLeave);
                    el.removeEventListener('mouseup', handleMouseUp);
                    el.removeEventListener('mousemove', handleMouseMove);
                    el.removeEventListener('wheel', handleWheel);
                };
            }, [isDown, startX, scrollLeft]);

            return ref;
        };

        const App = () => {
            const spots = {
                '양양 죽도': { lat: 38.025, lng: 128.718 },
                '양양 인구': { lat: 38.020, lng: 128.719 },
                '양양 동산': { lat: 38.016, lng: 128.724 },
                '양양 기사문': { lat: 38.012, lng: 128.728 },
                '고성 송지호': { lat: 38.337, lng: 128.513 },
                '고성 봉포': { lat: 38.246, lng: 128.567 },
            };

            const next14Days = useMemo(() => {
                const days = [];
                for (let i = 0; i < 14; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() + i);
                    days.push(d.toISOString().split('T')[0]);
                }
                return days;
            }, []);

            const [selectedSpot, setSelectedSpot] = useState('양양 죽도');
            const [selectedDate, setSelectedDate] = useState(next14Days[0]);
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            // 스크롤 레퍼런스 적용
            const spotScrollRef = useDraggableScroll();
            const dateScrollRef = useDraggableScroll();

            const fetchSurfData = async (spotName, dateStr) => {
                setLoading(true);
                const spot = spots[spotName];
                try {
                    const marineUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${spot.lat}&longitude=${spot.lng}&hourly=wave_height,wave_period,wave_direction&timezone=Asia%2FSeoul`;
                    const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${spot.lat}&longitude=${spot.lng}&hourly=wind_speed_10m,wind_direction_10m&timezone=Asia%2FSeoul`;

                    const [marineRes, weatherRes] = await Promise.all([fetch(marineUrl), fetch(weatherUrl)]);
                    const marineJson = await marineRes.json();
                    const weatherJson = await weatherRes.json();

                    const targetTimeStr = `${dateStr}T13:00`;
                    const timeIdx = marineJson.hourly.time.indexOf(targetTimeStr);
                    const finalIdx = timeIdx !== -1 ? timeIdx : 0;

                    const getWindDir = (deg) => {
                        if (deg >= 225 && deg <= 315) return 'W';
                        if (deg > 315 || deg < 45) return 'N';
                        if (deg >= 45 && deg <= 135) return 'E';
                        return 'S';
                    };

                    setData({
                        waveHeight: marineJson.hourly.wave_height[finalIdx],
                        period: marineJson.hourly.wave_period[finalIdx],
                        windDir: getWindDir(weatherJson.hourly.wind_direction_10m[finalIdx]),
                        windSpeed: weatherJson.hourly.wind_speed_10m[finalIdx],
                    });
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchSurfData(selectedSpot, selectedDate);
            }, [selectedSpot, selectedDate]);

            const analyzeConditions = (d) => {
                if (!d) return null;
                let score = 0;
                let pros = [];
                let cons = [];
                
                if (d.waveHeight >= 0.4 && d.waveHeight <= 0.9) {
                    score += 45;
                    pros.push("파도가 낮고 완만합니다. 테이크오프 연습하기 최고예요!");
                } else if (d.waveHeight > 1.2) {
                    cons.push("파도가 높아서 초보에겐 위험할 수 있어요.");
                } else if (d.waveHeight < 0.2) {
                    cons.push("파도가 너무 작아서 연습이 힘들 수도 있어요.");
                }

                const isOffshore = ['W', 'NW', 'SW'].includes(d.windDir);
                if (isOffshore) {
                    score += 40;
                    pros.push("오프쇼어 바람이라 파도 모양이 예뻐요!");
                } else {
                    cons.push("온쇼어 바람입니다. 파도가 조금 찌그러질 수 있어요.");
                }

                if (d.period >= 6) {
                    score += 15;
                    pros.push("파도 힘이 좋아서 보드가 잘 밀려요.");
                }

                let travelAdvice = "";
                let travelColor = "";
                let travelIcon = null;

                if (score >= 85) {
                    travelAdvice = "지금 당장 양양으로 쏘세요!";
                    travelColor = "bg-green-600";
                    travelIcon = "ThumbsUp";
                } else if (score >= 60) {
                    travelAdvice = "연습하러 가기 좋습니다.";
                    travelColor = "bg-blue-600";
                    travelIcon = "Car";
                } else if (score >= 40) {
                    travelAdvice = "초보에겐 조금 힘든 바다";
                    travelColor = "bg-red-500";
                    travelIcon = "AlertCircle";
                } else {
                    travelAdvice = "집에서 서핑 유튜브 보며 쉬기";
                    travelColor = "bg-gray-600";
                    travelIcon = "ThumbsDown";
                }

                let status = score >= 80 ? "서핑 강추!" : score >= 50 ? "연습 가능" : "초보 비추천";
                let color = score >= 80 ? "text-green-600" : score >= 50 ? "text-blue-600" : "text-red-500";
                let bg = score >= 80 ? "bg-green-50" : score >= 50 ? "bg-blue-50" : "bg-red-50";

                return { status, pros, cons, color, bg, travelAdvice, travelColor, travelIcon, score };
            };

            const analysis = analyzeConditions(data);

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans pb-20">
                    <div className="max-w-xl mx-auto space-y-6">
                        <header className="flex justify-between items-center mb-4">
                            <div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight flex items-center gap-2">
                                    <Icon name="Waves" className="text-blue-600" /> 서프-헬퍼
                                </h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic leading-none">SEOUL SURFER GUIDE</p>
                            </div>
                            <button onClick={() => fetchSurfData(selectedSpot, selectedDate)} className="p-2 bg-white rounded-full shadow-sm border active:scale-95 transition-transform">
                                <Icon name="RefreshCw" className={`text-slate-400 ${loading ? 'animate-spin' : ''}`} />
                            </button>
                        </header>

                        {/* 지역 선택 */}
                        <div className="w-full overflow-hidden">
                            <div ref={spotScrollRef} className="scroll-container no-scrollbar">
                                {Object.keys(spots).map(spot => (
                                    <div key={spot} className="scroll-item">
                                        <button 
                                            onClick={() => setSelectedSpot(spot)} 
                                            className={`px-5 py-2.5 rounded-2xl text-sm font-bold transition-all border-2 whitespace-nowrap ${selectedSpot === spot ? 'bg-slate-900 border-slate-900 text-white shadow-lg' : 'bg-white text-slate-500 border-slate-200 hover:border-slate-300'}`}
                                        >
                                            {spot}
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        {/* 날짜 선택 */}
                        <div className="w-full overflow-hidden">
                            <div ref={dateScrollRef} className="scroll-container no-scrollbar">
                                {next14Days.map((date, i) => {
                                    const d = new Date(date);
                                    const dayName = ['일', '월', '화', '수', '목', '금', '토'][d.getDay()];
                                    return (
                                        <div key={date} className="scroll-item">
                                            <button 
                                                onClick={() => setSelectedDate(date)} 
                                                className={`flex flex-col items-center min-w-[75px] py-4 rounded-[2rem] transition-all border-2 ${selectedDate === date ? 'bg-blue-50 border-blue-500 text-blue-700' : 'bg-white border-slate-100 text-gray-400 shadow-sm hover:border-slate-300'}`}
                                            >
                                                <span className="text-[10px] font-bold opacity-60 uppercase mb-1">{date.split('-')[1]}/{date.split('-')[2]}</span>
                                                <span className="text-xl font-black">{date.split('-')[2]}</span>
                                                <span className="text-[10px] font-bold">({dayName})</span>
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                            <p className="text-center text-[11px] text-slate-400 font-bold mt-2 animate-pulse tracking-tighter">
                                {window.innerWidth > 768 ? '마우스로 끌거나 휠을 돌려보세요' : '옆으로 밀어서 14일치 확인하기'}
                            </p>
                        </div>

                        {loading ? (
                            <div className="h-64 flex flex-col items-center justify-center bg-white rounded-[3rem] border-2 border-dashed border-slate-200">
                                <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="text-slate-400 font-bold text-sm">데이터 분석 중...</p>
                            </div>
                        ) : (
                            <div className="space-y-5 animate-in fade-in zoom-in duration-300">
                                <div className={`${analysis.bg} p-8 rounded-[3.5rem] border-4 ${analysis.color.replace('text', 'border')} shadow-xl relative overflow-hidden`}>
                                    <div className="text-center relative z-10">
                                        <div className="inline-flex items-center gap-2 px-4 py-1.5 bg-white/80 backdrop-blur rounded-full text-[11px] font-black text-slate-500 mb-6 shadow-sm border border-slate-100">
                                            <Icon name="MapPin" size={12} className="text-red-500" /> {selectedSpot} · {selectedDate.split('-')[1]}/{selectedDate.split('-')[2]}
                                        </div>
                                        <h2 className={`text-4xl font-black mb-2 ${analysis.color} leading-tight`}>{analysis.travelAdvice}</h2>
                                        <p className="text-slate-400 text-sm font-bold mb-8 italic">Surf Condition Analysis</p>
                                    </div>

                                    <div className="grid grid-cols-3 gap-3 mb-8">
                                        {[
                                            { icon: 'Waves', label: '파고', val: `${data.waveHeight}m`, color: 'text-blue-500' },
                                            { icon: 'Wind', label: '풍향', val: data.windDir, color: 'text-slate-600' },
                                            { icon: 'Navigation', label: '주기', val: `${data.period}s`, color: 'text-orange-500' }
                                        ].map((item, i) => (
                                            <div key={i} className="bg-white p-5 rounded-[2.2rem] text-center shadow-sm border border-slate-50">
                                                <Icon name={item.icon} className={`mx-auto mb-2 ${item.color}`} size={24} />
                                                <span className="block text-[10px] font-bold text-slate-400 mb-1">{item.label}</span>
                                                <span className="text-lg font-black text-slate-800 tracking-tighter">{item.val}</span>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="space-y-3">
                                        {analysis.pros.map((msg, i) => (
                                            <div key={i} className="flex items-center gap-3 bg-white/70 backdrop-blur p-4 rounded-2xl text-[11px] font-bold text-slate-700 border border-green-100 shadow-sm leading-snug">
                                                <Icon name="CheckCircle2" className="text-green-500 shrink-0" size={18} /> {msg}
                                            </div>
                                        ))}
                                        {analysis.cons.map((msg, i) => (
                                            <div key={i} className="flex items-center gap-3 bg-white/70 backdrop-blur p-4 rounded-2xl text-[11px] font-bold text-slate-700 border border-red-100 shadow-sm leading-snug">
                                                <Icon name="XCircle" className="text-red-400 shrink-0" size={18} /> {msg}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
